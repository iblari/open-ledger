# Vote Unbiased — monthly data refresh.
#
# Every Monday morning (US Eastern), pulls fresh values for the 6 landing/
# dashboard headline metrics from FRED, regenerates data/fred-snapshot.json,
# and opens a PR with the change if anything moved. Site picks up the new
# numbers automatically when the PR is merged + Vercel rebuilds.
#
# Required GitHub repo secret:
#   FRED_API_KEY — same key /api/benchmark-data uses for Live Benchmark.
#                  Get one free at https://fred.stlouisfed.org/docs/api/api_key.html
#
# Trigger options:
#   - Scheduled: every Monday at 13:00 UTC (~9 AM ET, after the workday starts)
#   - Manual:    Actions → "Refresh data" → Run workflow
#
# The workflow is a no-op when nothing changed (data still the same as last
# week's commit). When something did change, it commits + opens a PR titled
# "📊 monthly data refresh" that you can review + merge with one click.

name: Refresh data

on:
  schedule:
    # 15th of each month, 13:00 UTC (9am ET) — after the early-month BLS jobs
    # report and mid-month CPI print have propagated to FRED. The site's
    # ledger displays FINAL ANNUAL series (in-progress year excluded), so new
    # data lands ~once a year per metric plus occasional agency revisions —
    # a weekly cadence was ~4x more runs than the data could justify, and the
    # /live-benchmark layer already covers intra-month movements by fetching
    # FRED at request time (1h cache).
    - cron: "0 13 15 * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write       # commit the regenerated snapshot
  pull-requests: write  # open the PR

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull latest data from FRED
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node scripts/refresh-data.mjs

      # Open a PR only if the snapshot actually changed. peter-evans/
      # create-pull-request handles the "no-op when nothing changed" case
      # natively — exits cleanly without opening a PR.
      # AUTOPILOT: commit directly to main instead of opening a PR. The
      # refresh scripts already carry the safety rails (merge-over-replace,
      # in-progress-year exclusion), and the sanity gate below refuses to
      # publish a snapshot that shrank or doesn't parse — the failure mode
      # a human review was guarding against. Vercel auto-deploys main, so
      # fresh data is live minutes after the agencies publish it, no clicks.
      - name: Validate + commit directly to main
        run: |
          set -e
          if git diff --quiet -- data/fred-snapshot.json; then
            echo "No changes — nothing to publish."
            exit 0
          fi
          # Sanity gate: parses as JSON and did not lose data mass.
          node -e "
            const fs = require('fs');
            const next = JSON.parse(fs.readFileSync('data/fred-snapshot.json', 'utf8'));
            const { execSync } = require('child_process');
            const prevRaw = execSync('git show HEAD:data/fred-snapshot.json', { encoding: 'utf8' });
            const prev = JSON.parse(prevRaw);
            const size = (o) => JSON.stringify(o).length;
            if (size(next) < size(prev) * 0.9) {
              console.error('REFUSING: new snapshot is >10% smaller than previous — possible source failure.');
              process.exit(1);
            }
            console.log('sanity OK: prev', size(prev), 'bytes → next', size(next), 'bytes');
          "
          git config user.name "vote-unbiased-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/fred-snapshot.json
          git commit -m "📊 monthly data refresh (auto)"
          git pull --rebase origin main
          git push origin main
