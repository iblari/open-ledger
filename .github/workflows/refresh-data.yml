# Vote Unbiased — weekly data refresh.
#
# Every Monday morning (US Eastern), pulls fresh values for the 6 landing/
# dashboard headline metrics from FRED, regenerates data/fred-snapshot.json,
# and opens a PR with the change if anything moved. Site picks up the new
# numbers automatically when the PR is merged + Vercel rebuilds.
#
# Required GitHub repo secret:
#   FRED_API_KEY — same key /api/benchmark-data uses for Live Benchmark.
#                  Get one free at https://fred.stlouisfed.org/docs/api/api_key.html
#
# Trigger options:
#   - Scheduled: every Monday at 13:00 UTC (~9 AM ET, after the workday starts)
#   - Manual:    Actions → "Refresh data" → Run workflow
#
# The workflow is a no-op when nothing changed (data still the same as last
# week's commit). When something did change, it commits + opens a PR titled
# "📊 weekly data refresh" that you can review + merge with one click.

name: Refresh data

on:
  schedule:
    # Mondays 13:00 UTC (9am Eastern, midweek for Europe) — after BLS prints
    # its Friday jobs report has had time to propagate to FRED.
    - cron: "0 13 * * 1"
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write       # commit the regenerated snapshot
  pull-requests: write  # open the PR

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull latest data from FRED
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node scripts/refresh-data.mjs

      # Open a PR only if the snapshot actually changed. peter-evans/
      # create-pull-request handles the "no-op when nothing changed" case
      # natively — exits cleanly without opening a PR.
      - name: Open PR if snapshot changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "📊 weekly data refresh"
          title: "📊 Weekly data refresh"
          body: |
            Automated weekly refresh from FRED.

            Latest values for the 6 headline metrics (GDP growth,
            unemployment, inflation, S&P 500, debt-to-GDP, median income)
            pulled from the FRED API and aggregated to annual rows.

            Merge to push the new values to the site. Conflicts here mean
            FRED's data has been revised since last Monday — usually
            harmless, but worth a glance.

            Generated by `.github/workflows/refresh-data.yml`.
          branch: data/weekly-refresh
          delete-branch: true
          add-paths: data/fred-snapshot.json
