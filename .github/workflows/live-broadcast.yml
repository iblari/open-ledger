# Vote Unbiased — Live Broadcast auto-trigger.
#
# Every 5 minutes, this workflow:
#   1. Checks /api/live-schedule. If an event is within its active window
#      (start - 10 min pre-roll → end + 30 min post-roll), covers it.
#   2. OTHERWISE checks /api/live-discover: if a watched channel with
#      "autoCover": true (public/live-channels.json) is streaming, covers
#      it automatically — no schedule entry needed. Capped per session by
#      the channel's maxCoverMinutes; re-covered by the next tick if the
#      stream outlives the cap.
# Either way it runs scripts/go-live.mjs for the computed duration and the
# transcript pipeline (yt-dlp → ffmpeg → Deepgram → /api/admin/ingest)
# does the rest.
#
# The script also auto-stops itself via --duration so the GitHub Action
# runner exits cleanly when the event ends — no orphan workers.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   - DEEPGRAM_API_KEY   the same key your Deepgram dashboard shows
#   - ADMIN_KEY          the same value you set in Vercel env vars
#   - API_URL            e.g. https://voteunbiased.org   (optional, defaults below)
#
# Manual trigger: Actions tab → "Live Broadcast" → Run workflow. Picks up
# anything currently live without waiting for the next cron tick.

name: Live Broadcast

on:
  schedule:
    # Every 5 minutes. GitHub Actions free-tier cron can be delayed up to
    # 15 min under heavy load — schedule.ts PRE_ROLL_SECONDS = 10 min buffers
    # this so we don't miss the start of an event.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      max_duration_min:
        description: "Hard ceiling on worker runtime in minutes (default 300, max 350)"
        required: false
        default: "300"

# Only one live-broadcast worker at a time. If a previous cron tick is still
# running a broadcast, this run will be cancelled rather than starting a
# second worker on the same event.
concurrency:
  group: live-broadcast
  cancel-in-progress: false

jobs:
  broadcast:
    runs-on: ubuntu-latest
    # 6hr is the GitHub Actions hard ceiling; the script's --duration will
    # cut us off earlier based on scheduledEnd.
    timeout-minutes: 350

    steps:
      - name: Check out repo (only need scripts/ + channel config)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/
            public/live-channels.json
            package.json
            package-lock.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Deno gives yt-dlp a JS runtime to solve YouTube's player challenges —
      # without one, the web client's formats are gated and datacenter IPs
      # hit the "confirm you're not a bot" wall more often.
      - name: Install Deno (yt-dlp JS runtime)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # YouTube requires PO (proof-of-origin) tokens from datacenter IPs —
      # without one, EVERY player client gets "Sign in to confirm you're not
      # a bot" (verified: default/android/tv/ios all rejected from a GitHub
      # runner). bgutil-ytdlp-pot-provider is the community-standard fix: a
      # local token-generator sidecar + a yt-dlp plugin that consumes it.
      # The plugin requires pip-installed yt-dlp (standalone binary can't
      # load pip plugins), so we install via pip instead of the release
      # binary.
      - name: Start PO-token provider + install yt-dlp with plugin
        run: |
          docker run -d --name pot-provider -p 4416:4416 brainicism/bgutil-ytdlp-pot-provider
          pip install -U yt-dlp bgutil-ytdlp-pot-provider
          yt-dlp --version
          ffmpeg -version | head -1
          # Give the provider a moment to boot, then confirm it's answering.
          sleep 3
          curl -sf http://127.0.0.1:4416/ping && echo " — pot provider up"
          # Diagnostic: confirm the plugin is discovered and the provider is
          # actually consulted. Look for "bgutil" in the plugin list and
          # "[pot]" / "PO Token" lines in the verbose output.
          yt-dlp -v --simulate --skip-download \
            --extractor-args "youtubepot-bgutilhttp:base_url=http://127.0.0.1:4416" \
            "https://www.youtube.com/watch?v=dQw4w9WgXcQ" 2>&1 | \
            grep -aiE "plugin|pot|token|sign in|error" | head -20 || true

      - name: Install ws (Deepgram WebSocket dep)
        run: npm install ws --no-save --no-audit --no-fund

      # Hit /api/live-schedule. If something is active, write its details
      # to a job output so the next step can decide whether to launch the
      # worker. If nothing is active, this step exits 0 (no event) and the
      # rest of the job is skipped.
      - name: Check schedule
        id: schedule
        env:
          API_URL: ${{ secrets.API_URL || 'https://voteunbiased.org' }}
        run: |
          set -e
          echo "Fetching $API_URL/api/live-schedule..."
          RESP=$(curl -fsSL "$API_URL/api/live-schedule" || echo '{"active":null}')
          echo "$RESP" | head -c 800
          echo
          ACTIVE=$(echo "$RESP" | jq -r '.active // empty')
          if [ -z "$ACTIVE" ]; then
            echo "No active event. Exiting cleanly."
            echo "has_event=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Compute remaining duration. activeSecondsRemaining is from now()
          # → scheduledEnd. We add 60s of post-roll grace, then clamp to the
          # workflow's max_duration_min input (default 300) so the runner
          # exits well before the 6hr ceiling.
          REMAIN=$(echo "$RESP" | jq -r '.activeSecondsRemaining // 0')
          MAX_MIN="${{ github.event.inputs.max_duration_min || '300' }}"
          MAX_SEC=$((MAX_MIN * 60))
          DURATION=$((REMAIN + 60))
          if [ "$DURATION" -gt "$MAX_SEC" ]; then DURATION=$MAX_SEC; fi
          if [ "$DURATION" -lt 60 ]; then
            echo "Event already ended (remain=$REMAIN). Skipping."
            echo "has_event=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "has_event=true"
            echo "youtube_url=$(echo "$RESP" | jq -r '.active.youtubeUrl // empty')"
            # streamUrl (direct HLS/radio) beats youtubeUrl for INGESTION —
            # ffmpeg reads it natively, no yt-dlp, no bot-checks.
            echo "ingest_url=$(echo "$RESP" | jq -r '.active.streamUrl // .active.youtubeUrl')"
            echo "title=$(echo "$RESP" | jq -r '.active.title')"
            echo "event_id=$(echo "$RESP" | jq -r '.active.id')"
            echo "duration_sec=$DURATION"
          } >> "$GITHUB_OUTPUT"
          echo "Found event: $(echo "$RESP" | jq -r '.active.title')"
          echo "Will run for ${DURATION}s (~$((DURATION/60)) min)"

      # ── Discovery fallback ──────────────────────────────────────
      # No scheduled event? Ask /api/live-discover whether any WATCHED
      # channel is streaming right now. Channels opt in to automatic
      # coverage via "autoCover": true in public/live-channels.json —
      # channels that stream near-24/7 (C-SPAN) stay opt-out so a cron
      # can't silently buy continuous transcription. Each auto-session is
      # capped by the channel's maxCoverMinutes; if the stream is still
      # live afterwards, the next cron tick starts a fresh session, so
      # long events get covered in capped blocks.
      - name: Check discovered streams
        id: discover
        if: steps.schedule.outputs.has_event != 'true'
        env:
          API_URL: ${{ secrets.API_URL || 'https://voteunbiased.org' }}
        run: |
          set -e
          echo "No scheduled event — checking /api/live-discover..."
          RESP=$(curl -fsSL "$API_URL/api/live-discover" || echo '{"live":[]}')
          echo "$RESP" | head -c 800
          echo
          # Join discovered streams against the channel config: keep only
          # autoCover channels, preserve config order as priority.
          PICK=$(jq -n \
            --argjson disc "$(echo "$RESP" | jq '.live // []')" \
            --argjson conf "$(jq '.channels' public/live-channels.json)" \
            '[ $conf[] | select(.autoCover == true) as $c
               | $disc[] | select(.channelId == $c.id)
               | { videoId, title, channelId, channelLabel,
                   maxMin: ($c.maxCoverMinutes // 180) } ] | first // empty')
          if [ -z "$PICK" ]; then
            echo "No auto-cover channel is live. Exiting cleanly."
            echo "has_event=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          MAX_MIN="${{ github.event.inputs.max_duration_min || '300' }}"
          CH_MIN=$(echo "$PICK" | jq -r '.maxMin')
          DUR_MIN=$(( CH_MIN < MAX_MIN ? CH_MIN : MAX_MIN ))
          VID=$(echo "$PICK" | jq -r '.videoId')
          LABEL=$(echo "$PICK" | jq -r '.channelLabel')
          TITLE=$(echo "$PICK" | jq -r 'if (.title // "") == "" then .channelLabel + " — Live" else .title end')
          {
            echo "has_event=true"
            echo "youtube_url=https://www.youtube.com/watch?v=$VID"
            echo "title=$TITLE"
            echo "event_id=discovered-$VID"
            echo "duration_sec=$((DUR_MIN * 60))"
          } >> "$GITHUB_OUTPUT"
          echo "Auto-covering: $TITLE ($LABEL) for ${DUR_MIN}min"

      - name: Run live broadcast worker
        if: steps.schedule.outputs.has_event == 'true' || steps.discover.outputs.has_event == 'true'
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
          API_URL: ${{ secrets.API_URL || 'https://voteunbiased.org' }}
          # Route yt-dlp through the PO-token sidecar explicitly (belt +
          # braces over plugin auto-discovery).
          YT_DLP_EXTRA_ARGS: --extractor-args youtubepot-bgutilhttp:base_url=http://127.0.0.1:4416
          # Scheduled event wins; discovery only fires when schedule was empty.
          # EV_INGEST is what ffmpeg listens to (streamUrl > youtubeUrl);
          # EV_DISPLAY is what the site embeds (youtubeUrl, or none).
          EV_INGEST: ${{ steps.schedule.outputs.has_event == 'true' && steps.schedule.outputs.ingest_url || steps.discover.outputs.youtube_url }}
          EV_DISPLAY: ${{ steps.schedule.outputs.has_event == 'true' && steps.schedule.outputs.youtube_url || steps.discover.outputs.youtube_url }}
          EV_TITLE: ${{ steps.schedule.outputs.has_event == 'true' && steps.schedule.outputs.title || steps.discover.outputs.title }}
          EV_ID: ${{ steps.schedule.outputs.has_event == 'true' && steps.schedule.outputs.event_id || steps.discover.outputs.event_id }}
          EV_DURATION: ${{ steps.schedule.outputs.has_event == 'true' && steps.schedule.outputs.duration_sec || steps.discover.outputs.duration_sec }}
        run: |
          set -e
          echo "Starting worker for event $EV_ID"
          node scripts/go-live.mjs "$EV_INGEST" "$EV_TITLE" \
            --duration "$EV_DURATION" \
            --display "${EV_DISPLAY:-none}"

      # Safety net: whatever happened above, make sure the site isn't left
      # showing a phantom live card. go-live.mjs handles its own failures,
      # but a hard runner kill (timeout, cancellation) can't be caught in
      # the script — this step runs even then. Stopping an already-off
      # site is a harmless no-op.
      - name: Ensure site is not left in live state
        if: always() && (steps.schedule.outputs.has_event == 'true' || steps.discover.outputs.has_event == 'true')
        env:
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
          API_URL: ${{ secrets.API_URL || 'https://voteunbiased.org' }}
        run: |
          curl -s -X POST "$API_URL/api/admin/go-live" \
            -H "Authorization: Bearer $ADMIN_KEY" \
            -H "Content-Type: application/json" \
            -d '{"action":"stop"}' | head -c 200
          echo " — live state cleared"
