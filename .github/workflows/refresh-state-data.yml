# Vote Unbiased — weekly state-level data refresh.
#
# Mirrors the FRED refresh workflow but pulls per-state annual history from
# different sources. Currently wired: Zillow ZHVI for median_home. As more
# pipelines are added to scripts/refresh-state-data.mjs (Census ACS, BLS LAUS,
# FBI UCR, CDC NVSS, EIA, MIT Election Lab) they'll roll up into the same
# snapshot + same weekly PR.
#
# No GitHub secret required for current sources — Zillow is an open CSV.
# Census/BLS/FBI/CDC/EIA need free API keys when their pipelines land; add
# those secrets as the pipelines come online.

name: Refresh state data

on:
  schedule:
    # Mondays 14:00 UTC (10 AM ET) — one hour after the national FRED refresh
    # so the two PRs arrive separately and are easier to review.
    - cron: "0 14 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull state-level data
        # Pipeline-specific env vars can go here as more sources are added:
        #   CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        #   BLS_API_KEY:    ${{ secrets.BLS_API_KEY }}
        #   FBI_API_KEY:    ${{ secrets.FBI_API_KEY }}
        #   EIA_API_KEY:    ${{ secrets.EIA_API_KEY }}
        run: node scripts/refresh-state-data.mjs

      - name: Open PR if snapshot changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "🗺️ weekly state-data refresh"
          title: "🗺️ Weekly state-data refresh"
          body: |
            Automated weekly refresh of the State Atlas snapshot.

            Real annual per-state values pulled from official sources and
            written to `data/state-snapshot.json`. The State Atlas trend
            chart uses this real data when present (overriding the smooth
            CAGR back-fill).

            Merge to push the new values to the site.

            Generated by `.github/workflows/refresh-state-data.yml`.
          branch: data/weekly-state-refresh
          delete-branch: true
          add-paths: data/state-snapshot.json
