# Vote Unbiased — monthly state-level data refresh.
#
# Mirrors the FRED refresh workflow but pulls per-state annual history from
# different sources. Currently wired: Zillow ZHVI for median_home. As more
# pipelines are added to scripts/refresh-state-data.mjs (Census ACS, BLS LAUS,
# FBI UCR, CDC NVSS, EIA, MIT Election Lab) they'll roll up into the same
# snapshot + same monthly PR.
#
# No GitHub secret required for current sources — Zillow is an open CSV.
# Census/BLS/FBI/CDC/EIA need free API keys when their pipelines land; add
# those secrets as the pipelines come online.

name: Refresh state data

on:
  schedule:
    # 15th of each month, 14:00 UTC (10am ET) — one hour after the national
    # refresh so the two PRs arrive separately. Sources here (Zillow ZHVI,
    # BLS LAUS, Census ACS) publish monthly-to-annually; weekly runs were
    # mostly no-ops.
    - cron: "0 14 15 * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull state-level data
        env:
          # Each pipeline gracefully SKIPS when its key is missing — adding
          # a secret in GitHub repo settings enables that pipeline immediately.
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          # Future keys (uncomment as the corresponding pipeline lands):
          # BLS_API_KEY:    ${{ secrets.BLS_API_KEY }}
          # FBI_API_KEY:    ${{ secrets.FBI_API_KEY }}
          # EIA_API_KEY:    ${{ secrets.EIA_API_KEY }}
          # BEA_API_KEY:    ${{ secrets.BEA_API_KEY }}
        run: node scripts/refresh-state-data.mjs

      # AUTOPILOT: commit directly to main instead of opening a PR. The
      # refresh scripts already carry the safety rails (merge-over-replace,
      # in-progress-year exclusion), and the sanity gate below refuses to
      # publish a snapshot that shrank or doesn't parse — the failure mode
      # a human review was guarding against. Vercel auto-deploys main, so
      # fresh data is live minutes after the agencies publish it, no clicks.
      - name: Validate + commit directly to main
        run: |
          set -e
          if git diff --quiet -- data/state-snapshot.json; then
            echo "No changes — nothing to publish."
            exit 0
          fi
          # Sanity gate: parses as JSON and did not lose data mass.
          node -e "
            const fs = require('fs');
            const next = JSON.parse(fs.readFileSync('data/state-snapshot.json', 'utf8'));
            const { execSync } = require('child_process');
            const prevRaw = execSync('git show HEAD:data/state-snapshot.json', { encoding: 'utf8' });
            const prev = JSON.parse(prevRaw);
            const size = (o) => JSON.stringify(o).length;
            if (size(next) < size(prev) * 0.9) {
              console.error('REFUSING: new snapshot is >10% smaller than previous — possible source failure.');
              process.exit(1);
            }
            console.log('sanity OK: prev', size(prev), 'bytes → next', size(next), 'bytes');
          "
          git config user.name "vote-unbiased-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/state-snapshot.json
          git commit -m "🗺️ monthly state-data refresh (auto)"
          git pull --rebase origin main
          git push origin main
